<div class="container mt-4">

  <div class="header">
    <h2>Admission (Course-wise)</h2>
    <button mat-raised-button color="primary" (click)="addAdmission()">
      Add New Admission
    </button>
  </div>

  <!-- FILTER -->
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Select Course</mat-label>
    <mat-select (selectionChange)="onCourseChange($event)">
      <mat-option value="all">All Courses</mat-option>
      <mat-option *ngFor="let course of courses" [value]="course.CourseName">
        {{ course.CourseName }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- TABLE -->
  <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)"
    class="mat-elevation-z8">

    <!-- No -->
    <ng-container matColumnDef="No">
      <th mat-header-cell *matHeaderCellDef>No.</th>
      <td mat-cell *matCellDef="let element; let i = index">
        {{ i + 1 }}
      </td>
    </ng-container>

    <!-- Student -->
    <ng-container matColumnDef="StudentName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Student</th>
      <td mat-cell *matCellDef="let element">
        {{ element.StudentName }}
      </td>
    </ng-container>

    <!-- Course -->
    <ng-container matColumnDef="CourseName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Course</th>
      <td mat-cell *matCellDef="let element">
        {{ element.CourseName }}
      </td>
    </ng-container>

    <!-- Date -->
    <ng-container matColumnDef="AdmissionDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let element">
        {{ element.AdmissionDate | date }}
      </td>
    </ng-container>

    <!-- ACTION -->
    <ng-container matColumnDef="Action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let element">

        <!-- EDIT -->
        <button mat-icon-button color="primary"
          (click)="edit(element.AdmissionID)">
          <mat-icon>edit</mat-icon>
        </button>

        <!-- DELETE -->
        <button mat-icon-button color="warn"
          (click)="delete(element.AdmissionID)">
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons>
  </mat-paginator>

</div>
