<button (click)="addBookIssue()" mat-raised-button color="primary">
  Add Book Issue
</button>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

  <!-- Index -->
  <ng-container matColumnDef="No">
    <th mat-header-cell *matHeaderCellDef> No. </th>
    <td mat-cell *matCellDef="let element; let i = index">
      {{ (paginator.pageIndex * paginator.pageSize) + i + 1 }}
    </td>
  </ng-container>

  <!-- Student -->
  <ng-container matColumnDef="StudentName">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Student Name </th>
    <td mat-cell *matCellDef="let element">
      {{ element.StudentName }}
    </td>
  </ng-container>

  <!-- Book -->
  <ng-container matColumnDef="BookName">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Book Name </th>
    <td mat-cell *matCellDef="let element">
      {{ element.BookName }}
    </td>
  </ng-container>

  <!-- Issue Date -->
  <ng-container matColumnDef="IssueDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Issue Date </th>
    <td mat-cell *matCellDef="let element">
      {{ element.IssueDate }}
    </td>
  </ng-container>

  <!-- Return Date -->
  <ng-container matColumnDef="ReturnDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Return Date </th>
    <td mat-cell *matCellDef="let element">
      {{ element.ReturnDate }}
    </td>
  </ng-container>

  <!-- Status -->
  <ng-container matColumnDef="Status">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
    <td mat-cell *matCellDef="let element">
      {{ element.Status }}
    </td>
  </ng-container>

  <!-- Action -->
  <ng-container matColumnDef="Action">
    <th mat-header-cell *matHeaderCellDef> Action </th>
    <td mat-cell *matCellDef="let element">
      
      <button mat-icon-button color="primary" (click)="edit(element.IssueID)">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="delete(element.IssueID)">
        <mat-icon>delete</mat-icon>
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator
  [pageSizeOptions]="[5,10,20]"
  [pageSize]="5"
  showFirstLastButtons>
</mat-paginator>
