<!-- Add Attendance Button -->
<button (click)="addAttendance()" mat-raised-button color="primary">
  Add Attendance
</button>

<!-- Course Filter Dropdown -->
<mat-form-field appearance="fill" class="w-50">
  <mat-label>Select Course</mat-label>
  <mat-select [(ngModel)]="selectedCourseId" (selectionChange)="filterByCourse()">
    <mat-option [value]="null">All Courses</mat-option>
    <mat-option *ngFor="let c of courses" [value]="c.CourseID">
      {{ c.CourseName }}
    </mat-option>
  </mat-select>
</mat-form-field>

<!-- Attendance Table -->
<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

  <!-- Student Name Column -->
  <ng-container matColumnDef="StudentName">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Student Name</th>
    <td mat-cell *matCellDef="let element">{{element.StudentName}}</td>
  </ng-container>

  <!-- Course Name Column -->
  <ng-container matColumnDef="CourseName">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Course</th>
    <td mat-cell *matCellDef="let element">{{element.CourseName}}</td>
  </ng-container>

  <!-- Date Column -->
  <ng-container matColumnDef="Date">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
    <td mat-cell *matCellDef="let element">{{element.Date | date:'dd-MM-yyyy'}}</td>
  </ng-container>

  <!-- Status Column -->
  <ng-container matColumnDef="Status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let element">{{element.Status}}</td>
  </ng-container>

  <!-- Action Column -->
  <ng-container matColumnDef="Action">
    <th mat-header-cell *matHeaderCellDef>Action</th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button color="primary" (click)="edit(element.AttendanceID)">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="deleteAttendance(element.AttendanceID)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>
