<div class="container mt-4">
  <div class="header mb-3 d-flex align-items-center justify-content-between">
    <h2>Attendance</h2>

    <div>
      <button mat-button (click)="prevMonth()">Previous Month</button>
      <span class="mx-2">{{ currentMonth }}/{{ currentYear }}</span>
      <button mat-button (click)="nextMonth()">Next Month</button>
    </div>

    <mat-form-field appearance="fill">
      <mat-label>Select Course</mat-label>
      <mat-select [(value)]="selectedCourseId" (selectionChange)="loadStudents()">
        <mat-option *ngFor="let c of courses" [value]="c.CourseID">{{ c.CourseName }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="table-responsive">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <!-- Student Name -->
      <ng-container matColumnDef="StudentName">
        <th mat-header-cell *matHeaderCellDef> Student Name </th>
        <td mat-cell *matCellDef="let student"> {{ student.StudentName }} </td>
      </ng-container>

      <!-- Attendance Days -->
      <ng-container *ngFor="let day of days" [matColumnDef]="day.toString()">
        <th mat-header-cell *matHeaderCellDef> {{ day }} </th>
        <td mat-cell *matCellDef="let student">
          <div class="attendance-cell" (click)="toggleAttendance(student, day)">
            <span [ngClass]="getAttendanceClass(student.attendance[dateStr(day)])">
              {{ student.attendance[dateStr(day)] || '-' }}
            </span>
          </div>
        </td>
      </ng-container>

      <!-- Missed Days -->
      <ng-container matColumnDef="missed">
        <th mat-header-cell *matHeaderCellDef> Days Missed </th>
        <td mat-cell *matCellDef="let student"> {{ student.missed }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSize]="10"></mat-paginator>
  </div>
</div>
